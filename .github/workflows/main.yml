name: Sports Bot Automation

on:
  schedule:
   - cron: '0 */1  * * *' # Runs at 12:00, 2:00, 4:00, etc.
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        # UPDATED: v4 -> v5 (Supports Node 24)
        uses: actions/checkout@v5

      - name: Setup Python
        # UPDATED: v5 -> v6 (Supports Node 24)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install tweepy requests

      - name: Run Script
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: python bot.py
