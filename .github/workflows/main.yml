name: Standings Bot

on:
  schedule:
    # 7:17 AM to 10:17 PM Central Time
    - cron: '17 0-3,12-23 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # We can keep this for safety, but the version updates below do the heavy lifting
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated from v4

      - name: Set up Python
        uses: actions/setup-python@v6  # Updated from v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run bot
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SPORTS_API_KEY: ${{ secrets.SPORTS_API_KEY }}
        run: python bot.py
